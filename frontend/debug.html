<!DOCTYPE html>
<html>
<head><title>Debug</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px;">
<h2>SEO Automator Debug</h2>
<div id="log"></div>
<script>
function log(msg) {
  document.getElementById('log').innerHTML += '<p>' + msg + '</p>';
}

window.onerror = function(msg, url, line, col, err) {
  log('ERROR: ' + msg + ' (line ' + line + ' in ' + url.split('/').pop() + ')');
  return true;
};

log('1. Starting debug...');
</script>

<script>
log('2. Loading Supabase SDK...');
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
log('3. Supabase SDK loaded. typeof window.supabase = ' + typeof window.supabase);
log('   typeof supabase = ' + typeof supabase);
if (typeof supabase !== 'undefined') {
  log('   supabase keys: ' + Object.keys(supabase).join(', '));
  log('   typeof supabase.createClient = ' + typeof supabase.createClient);
}
</script>

<script src="./config.js"></script>
<script>
log('4. Config loaded.');
log('   SUPABASE_URL = ' + (typeof SUPABASE_URL !== 'undefined' ? SUPABASE_URL.substring(0, 40) + '...' : 'UNDEFINED'));
log('   SUPABASE_ANON_KEY = ' + (typeof SUPABASE_ANON_KEY !== 'undefined' ? SUPABASE_ANON_KEY.substring(0, 30) + '...' : 'UNDEFINED'));
</script>

<script>
log('5. Attempting createClient...');
try {
  var client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  log('SUCCESS: Supabase client created!');
  client.auth.getSession().then(function(result) {
    log('6. Auth getSession: data=' + !!result.data + ', error=' + result.error);
  }).catch(function(e) {
    log('6. Auth error: ' + e.message);
  });
} catch(e) {
  log('FAILED createClient: ' + e.message);
}
</script>
</body>
</html>
