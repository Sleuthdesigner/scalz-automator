name: Fetch and commit scalz-seo-automator.zip

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'frontend/scalz-seo-automator.zip'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch scalz-seo-automator.zip
        run: |
          mkdir -p frontend
          curl -sL "https://files.catbox.moe/aq0oj6.zip" -o frontend/scalz-seo-automator.zip
          echo "Downloaded $(wc -c < frontend/scalz-seo-automator.zip) bytes"
          file frontend/scalz-seo-automator.zip

      - name: Check if zip changed
        id: check_zip
        run: |
          if git diff --quiet frontend/scalz-seo-automator.zip 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_zip.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/scalz-seo-automator.zip
          git commit -m "feat: add full scalz-seo-automator.zip (50265 bytes) for Vercel download"
          git push origin main
