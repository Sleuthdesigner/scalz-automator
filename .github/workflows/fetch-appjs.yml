name: Fetch large frontend files

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/fetch-appjs.yml'

jobs:
  fetch-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch app.js from dpaste
        run: |
          echo "Fetching app.js from dpaste..."
          curl -sSL --retry 3 --retry-delay 2 -o frontend/app.js https://dpaste.com/8T7LW4GSB.txt
          APPJS_SIZE=$(wc -c < frontend/app.js)
          echo "app.js: ${APPJS_SIZE} bytes"
          if [ "$APPJS_SIZE" -lt 10000 ]; then
            echo "ERROR: app.js too small (${APPJS_SIZE} bytes), fetch may have failed"
            cat frontend/app.js
            exit 1
          fi

      - name: Fetch style.css from dpaste
        run: |
          echo "Fetching style.css from dpaste..."
          curl -sSL --retry 3 --retry-delay 2 -o frontend/style.css https://dpaste.com/BAME4W58H.txt
          CSS_SIZE=$(wc -c < frontend/style.css)
          echo "style.css: ${CSS_SIZE} bytes"
          if [ "$CSS_SIZE" -lt 10000 ]; then
            echo "ERROR: style.css too small (${CSS_SIZE} bytes), fetch may have failed"
            cat frontend/style.css
            exit 1
          fi

      - name: Commit and push files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js frontend/style.css
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping."
          else
            git commit -m "chore: update frontend/app.js and frontend/style.css from dpaste sources"
            git push
            echo "Files committed and pushed successfully."
          fi
