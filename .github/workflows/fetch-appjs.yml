name: Fetch app.js from dpaste

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/fetch-appjs.yml'  # Re-run if workflow itself changes

jobs:
  fetch-appjs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch app.js from dpaste
        run: |
          echo "Fetching app.js from dpaste..."
          curl -fsSL https://dpaste.com/93TC2YS6Z.txt -o frontend/app.js
          echo "Downloaded $(wc -c < frontend/app.js) bytes"
          head -3 frontend/app.js

      - name: Commit and push app.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js
          if git diff --cached --quiet; then
            echo "No changes to app.js, skipping commit."
          else
            git commit -m "chore: update frontend/app.js from dpaste source"
            git push
            echo "app.js committed and pushed successfully."
          fi
