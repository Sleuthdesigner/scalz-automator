name: Fetch large frontend files

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/fetch-appjs.yml'  # Re-run if workflow itself changes

jobs:
  fetch-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch app.js from dpaste
        run: |
          echo "Fetching app.js from dpaste..."
          curl -fsSL https://dpaste.com/93TC2YS6Z.txt -o frontend/app.js
          echo "Downloaded $(wc -c < frontend/app.js) bytes for app.js"

      - name: Fetch style.css from dpaste
        run: |
          echo "Fetching style.css from dpaste..."
          curl -fsSL https://dpaste.com/7WTNR5WBU.txt -o frontend/style.css
          echo "Downloaded $(wc -c < frontend/style.css) bytes for style.css"

      - name: Commit and push files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js frontend/style.css
          if git diff --cached --quiet; then
            echo "No changes to commit, skipping."
          else
            git commit -m "chore: update frontend/app.js and frontend/style.css from dpaste sources"
            git push
            echo "Files committed and pushed successfully."
          fi
