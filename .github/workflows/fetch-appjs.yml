name: Fetch app.js
on:
  push:
    paths:
      - '.github/workflows/fetch-appjs.yml'
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download app.js
        run: curl -sL https://dpaste.com/EY5HKSUHQ.txt -o frontend/app.js
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js
          git commit -m "Update app.js: dynamic role system in sidebar" || echo "No changes"
          git push
