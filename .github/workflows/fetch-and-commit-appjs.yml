name: Fetch and commit frontend app.js

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fetch-and-commit-appjs.yml'

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch app.js from dpaste
        run: |
          mkdir -p frontend
          curl -sL "https://dpaste.com/2XDU4A7XC.txt" -o frontend/app.js
          echo "Downloaded $(wc -c < frontend/app.js) bytes"
          head -3 frontend/app.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js
          git commit -m "fix: use window.open for mailto links to prevent page navigation" || echo "Nothing to commit"
          git push origin main
