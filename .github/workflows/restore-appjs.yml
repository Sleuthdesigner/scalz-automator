name: Restore frontend/app.js from dpaste

on:
  workflow_dispatch:

jobs:
  restore-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download app.js from dpaste
        run: |
          curl -s https://dpaste.com/3HZXF5YGP.txt -o frontend/app.js
          echo "Downloaded $(wc -c < frontend/app.js) bytes"
          head -2 frontend/app.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js
          git commit -m "feat: email-first client onboarding wizard, enhanced intake form with target market and service areas, fixed DB column mappings"
          git push origin main
