name: Push plugin zip
on: push
jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and commit zip
        run: |
          curl -sL "https://files.catbox.moe/aq0oj6.zip" -o frontend/scalz-seo-automator.zip
          ls -la frontend/scalz-seo-automator.zip
          file frontend/scalz-seo-automator.zip
          git rm -f frontend/vercel.json || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/scalz-seo-automator.zip
          git commit -m "feat: add real plugin zip binary, remove redirect"
          git push
