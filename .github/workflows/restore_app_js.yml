name: Restore app.js from backup

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/restore_app_js.yml'

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch app.js from backup
        run: |
          curl -s https://dpaste.com/F3CQ9D7XY.txt -o frontend/app.js
          echo "Downloaded $(wc -c < frontend/app.js) bytes"
          echo "MD5: $(md5sum frontend/app.js)"

      - name: Commit app.js
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add frontend/app.js
          git diff --staged --stat
          git commit -m "feat: add client setup wizard, ACF detection, 11 SEO prompt templates, fix template_text column mapping" || echo "Nothing to commit"
          git push
