name: Update app.js

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-app.yml'

permissions:
  contents: write

jobs:
  update-file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download app.js from dpaste
        run: curl -s -o frontend/app.js https://dpaste.com/EZ7ESFQVL.txt

      - name: Commit and push app.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js
          git diff --staged --quiet && echo "No changes" && exit 0
          TITLE="feat: SMTP provider quick-setup with guides for Gmail, Outlook, SendGrid, Mailgun, SES, Zoho"
          BODY="- Replace master SMTP option with provider dropdown in first-time setup"$'\n'"- Add step-by-step setup instructions for each provider"$'\n'"- Add provider quick-setup dropdown to Settings page"$'\n'"- Auto-fill host/port when provider selected"$'\n'"- Includes clickable links to each provider's setup pages"
          git commit -m "$TITLE"$'\n\n'"$BODY"
          git push
