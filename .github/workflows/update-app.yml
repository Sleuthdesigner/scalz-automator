name: Update app.js from dpaste

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-app.yml'

jobs:
  update-app:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download app.js from dpaste
        run: |
          sleep 2
          curl -s "https://dpaste.com/6PM9SVJYM.txt" -o frontend/app.js
          echo "Downloaded $(wc -c < frontend/app.js) bytes"
          echo "Lines: $(wc -l < frontend/app.js)"
          head -5 frontend/app.js

      - name: Commit and push app.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/app.js
          git diff --staged --stat
          git commit -m "fix: resolve client creation bugs + add template button\n\n- Fix email\u2192contact_email column mismatch in client creation wizard\n- Fix wp_app_password\u2192wp_password column mismatch\n- Fix notes\u2192special_instructions column mismatch\n- Fix same column mismatches in edit client modal\n- Add 'Add Template' button to Prompt Templates page\n- Fix SMTP port input min/max constraints"
          git push
